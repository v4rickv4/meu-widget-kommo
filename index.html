<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metas do Funil - Kommo</title>
  <style>
    :root {
      --primary: #4c8bf7;
      --success: #22c55e;
      --bg: #0f111a;         
      --bg-alt: #1a1d2e;     
      --text-main: #ffffff;  
      --text-muted: #8f9a9d; 
      --border: #2a2d3d;     
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: transparent;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .widget-card {
      background: var(--bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      border: 1px solid var(--border);
    }
    .header {
      margin-bottom: 24px;
      text-align: center;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .funnel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .funnel-row:last-child {
      border-bottom: none;
    }
    .stage-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
    }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .input-box {
      width: 60px;
      padding: 8px;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 16px;
      text-align: right;
      color: var(--success);
      font-weight: 700;
      outline: none;
      transition: all 0.2s;
    }
    .input-box:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(76, 139, 247, 0.2);
    }
    .pct-sign {
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 600;
    }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
  </style>
</head>
<body>

  <div class="widget-card">
    <div class="header">
      <h3 class="title">Metas do Funil</h3>
    </div>
    
    <div class="funnel-row">
      <span class="stage-name">Qualificado</span>
      <div class="input-wrap">
        <input type="number" id="qualificado" class="input-box" value="80" min="0" max="100">
        <span class="pct-sign">%</span>
      </div>
    </div>

    <div class="funnel-row">
      <span class="stage-name">Agendamento</span>
      <div class="input-wrap">
        <input type="number" id="agendamento" class="input-box" value="40" min="0" max="100">
        <span class="pct-sign">%</span>
      </div>
    </div>

    <div class="funnel-row">
      <span class="stage-name">Comparecimentos</span>
      <div class="input-wrap">
        <input type="number" id="comparecimentos" class="input-box" value="30" min="0" max="100">
        <span class="pct-sign">%</span>
      </div>
    </div>

    <div class="funnel-row">
      <span class="stage-name">Vendas Ganhas</span>
      <div class="input-wrap">
        <input type="number" id="vendas_ganhas" class="input-box" value="30" min="0" max="100">
        <span class="pct-sign">%</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Cole suas chaves aqui
    const supabaseUrl = 'SUA_URL_AQUI'
    const supabaseKey = 'SUA_CHAVE_ANON_AQUI'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Pegando os campos da tela
    const inputs = {
      qualificado: document.getElementById('qualificado'),
      agendamento: document.getElementById('agendamento'),
      comparecimentos: document.getElementById('comparecimentos'),
      vendas_ganhas: document.getElementById('vendas_ganhas')
    }

    // 1. Busca os dados no Supabase ao abrir a página
    async function carregarMetas() {
      const { data, error } = await supabase
        .from('metas_funil')
        .select('*')
        .eq('id', 1) // Vamos usar o ID 1 como a linha padrão das configurações
        .single()

      if (data) {
        inputs.qualificado.value = data.qualificado;
        inputs.agendamento.value = data.agendamento;
        inputs.comparecimentos.value = data.comparecimentos;
        inputs.vendas_ganhas.value = data.vendas_ganhas;
      }
    }

    // 2. Salva os dados no Supabase
    async function salvarMetas() {
      const metasAtualizadas = {
        id: 1, // Mantém sempre o ID 1 para atualizar a mesma linha
        qualificado: Number(inputs.qualificado.value),
        agendamento: Number(inputs.agendamento.value),
        comparecimentos: Number(inputs.comparecimentos.value),
        vendas_ganhas: Number(inputs.vendas_ganhas.value)
      }

      const { error } = await supabase
        .from('metas_funil')
        .upsert(metasAtualizadas)

      if (error) {
        console.error('Erro ao salvar as metas no banco:', error);
      } else {
        console.log('Metas salvas com sucesso no Supabase!');
      }
    }

    // Inicia o carregamento
    carregarMetas();

    // 3. Adiciona um "ouvinte" que dispara a função salvar toda vez que o valor mudar
    Object.values(inputs).forEach(input => {
      input.addEventListener('change', salvarMetas);
    });

  </script>
</body>
</html>
